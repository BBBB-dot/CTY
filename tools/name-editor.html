<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manhattan Neighborhood Name Editor — CTY</title>
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
<style>
:root {
  --bg: #141414;
  --surface: #1c1c1e;
  --surface2: #2c2c2e;
  --border: #3a3a3c;
  --text: #f5f5f5;
  --text2: #a1a1a6;
  --accent: #FFD700;
  --accent2: #FF6B35;
  --save: #34C759;
  --danger: #FF453A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ─── Sidebar ─── */
#sidebar {
  width: 380px;
  min-width: 380px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#sidebar-header {
  padding: 16px 20px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}

#sidebar-header h1 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--accent);
}

#sidebar-header p {
  font-size: 11px;
  color: var(--text2);
  margin-top: 4px;
}

#search-bar {
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
}

#search-bar input {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  outline: none;
}

#search-bar input:focus { border-color: var(--accent); }

#stats-bar {
  padding: 8px 20px;
  font-size: 11px;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 16px;
}

.stat-badge { display: flex; align-items: center; gap: 4px; }
.stat-dot { width: 6px; height: 6px; border-radius: 50%; }
.stat-dot.edited { background: var(--accent); }
.stat-dot.original { background: var(--text2); }

#hood-list { flex: 1; overflow-y: auto; padding: 8px 0; }

.hood-row {
  padding: 10px 20px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.hood-row:hover { background: var(--surface2); }
.hood-row.active { background: rgba(255, 215, 0, 0.1); border-left: 3px solid var(--accent); }
.hood-row.edited { background: rgba(255, 215, 0, 0.05); }
.hood-row.is-sub { padding-left: 36px; }

.hood-row-top { display: flex; justify-content: space-between; align-items: center; }
.hood-id-tag { font-size: 10px; color: var(--text2); font-family: 'SF Mono', 'Menlo', monospace; }
.hood-original { font-size: 12px; color: var(--text2); text-decoration: line-through; display: none; }
.hood-row.edited .hood-original { display: block; }
.hood-display-name { font-size: 13px; font-weight: 600; }
.hood-row.edited .hood-display-name { color: var(--accent); }
.hood-row.is-sub .hood-display-name { font-size: 12px; font-weight: 500; }
.edit-indicator { font-size: 10px; color: var(--accent); display: none; }
.hood-row.edited .edit-indicator { display: inline; }

/* ─── Map ─── */
#map-container { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* ─── Edit popup ─── */
#edit-popup {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1000;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

#edit-popup.visible { display: block; }
#edit-popup h3 { font-size: 14px; color: var(--text2); margin-bottom: 4px; }
#edit-popup .edit-original { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
#edit-popup .edit-id { font-size: 11px; color: var(--text2); margin-bottom: 16px; font-family: monospace; }

#edit-input {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 16px;
  font-weight: 600;
  outline: none;
  margin-bottom: 16px;
}

#edit-input:focus { border-color: var(--accent); }

.edit-actions { display: flex; gap: 10px; }
.edit-actions button {
  flex: 1; padding: 10px; border: none; border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
}
.edit-actions button:hover { opacity: 0.85; }
.btn-save { background: var(--accent); color: #000; }
.btn-reset { background: var(--surface2); color: var(--text); border: 1px solid var(--border) !important; }
.btn-cancel { background: transparent; color: var(--text2); }

/* ─── Top controls ─── */
#top-controls {
  position: absolute; top: 12px; right: 12px; z-index: 900;
  display: flex; gap: 8px;
}

.top-btn {
  padding: 8px 16px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.top-btn:hover { background: var(--surface2); }
.top-btn.export-btn { background: #065f46; border-color: #10b981; color: #10b981; }
.top-btn.export-btn:hover { background: #047857; color: #fff; }
.top-btn.apply-btn { background: #7c2d12; border-color: var(--accent2); color: var(--accent2); }
.top-btn.apply-btn:hover { background: #9a3412; color: #fff; }

#overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }
#overlay.visible { display: block; }

#toast {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--save); color: #000; padding: 10px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 600; z-index: 1100; opacity: 0;
  transition: opacity 0.3s; pointer-events: none;
}
#toast.show { opacity: 1; }

#hood-list::-webkit-scrollbar { width: 6px; }
#hood-list::-webkit-scrollbar-track { background: transparent; }
#hood-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Neighborhood Name Editor</h1>
    <p>Uses your defined CTY neighborhood names. Click to rename.</p>
  </div>
  <div id="search-bar">
    <input type="text" id="search-input" placeholder="Search neighborhoods..." />
  </div>
  <div id="stats-bar">
    <div class="stat-badge"><div class="stat-dot edited"></div><span id="edited-count">0</span> edited</div>
    <div class="stat-badge"><div class="stat-dot original"></div><span id="total-count">0</span> total</div>
  </div>
  <div id="hood-list"></div>
</div>

<div id="map-container">
  <div id="map"></div>
  <div id="top-controls">
    <button class="top-btn" onclick="resetAll()">Reset All</button>
    <button class="top-btn export-btn" onclick="exportOverrides()">Export JS</button>
    <button class="top-btn apply-btn" onclick="applyToProject()">Apply to neighborhoods.js</button>
  </div>
  <div id="overlay" onclick="closeEdit()"></div>
  <div id="edit-popup">
    <h3>Rename neighborhood</h3>
    <div class="edit-original" id="edit-original-name"></div>
    <div class="edit-id" id="edit-hood-id"></div>
    <input type="text" id="edit-input" placeholder="New display name..." />
    <div class="edit-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-reset" onclick="resetCurrent()">Reset</button>
      <button class="btn-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
  <div id="toast"></div>
</div>

<!-- Load YOUR existing project data -->
<script src="../data/neighborhoods.js"></script>
<script src="../js/nta-mapping.js"></script>
<script>
// ─── Config ───
mapboxgl.accessToken = atob('cGsuZXlKMUlqb2lZbkpwYzJ0aWNtbHpheUlzSW1FaU9pSmpiVzFuZDJKbk5uTXdibWRwTW05eE1XVnRZbTluWTJ0ekluMC5zYnNMbHlrVlYxZVgyelVCcXB4R213');

// Name overrides: hood ID → new display name
let nameOverrides = {};

// Manhattan neighborhood data from YOUR NEIGHBORHOODS array
let manhattanHoods = [];
let ntaFeatureMap = {};
let activeHoodId = null;

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [-73.98, 40.76],
  zoom: 12.5,
  bearing: 29,
});

map.on('load', () => {
  fetch('../data/nyc-neighborhoods.json')
    .then(r => r.json())
    .then(geo => initEditor(geo));
});

function initEditor(geo) {
  // Build NTA code → GeoJSON feature lookup
  geo.features.forEach(f => {
    if (f.properties.borough === 'Manhattan' && f.properties.ntatype === '0') {
      const code = typeof NTA_NAME_TO_CODE !== 'undefined' ? NTA_NAME_TO_CODE[f.properties.name] : null;
      if (code) ntaFeatureMap[code] = f;
    }
  });

  // Get YOUR Manhattan neighborhoods
  manhattanHoods = NEIGHBORHOODS
    .filter(h => h.borough === 'manhattan')
    .map(h => ({
      id: h.id,
      name: h.name,
      ntaCode: h.parent || h.id,
      isSub: !!h.parent,
      center: h.center,
    }))
    .sort((a, b) => a.name.localeCompare(b.name));

  // Build map polygons — one per parent NTA, labeled with YOUR names
  const ntaCodes = [...new Set(manhattanHoods.map(h => h.ntaCode))];
  const mapFeatures = [];

  ntaCodes.forEach((code, i) => {
    const f = ntaFeatureMap[code];
    if (!f) return;
    const subs = manhattanHoods.filter(h => h.ntaCode === code);
    const label = subs.map(h => nameOverrides[h.id] || h.name).join(' · ');

    mapFeatures.push({
      type: 'Feature',
      id: i,
      properties: { ntaCode: code, name: label, _idx: i },
      geometry: f.geometry,
    });
  });

  map.addSource('manhattan-nta', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: mapFeatures },
  });

  map.addLayer({
    id: 'manhattan-fill', type: 'fill', source: 'manhattan-nta',
    paint: {
      'fill-color': [
        'case',
        ['boolean', ['feature-state', 'active'], false], 'rgba(255, 215, 0, 0.35)',
        ['boolean', ['feature-state', 'hover'], false], 'rgba(255, 215, 0, 0.15)',
        'rgba(255, 255, 255, 0.05)'
      ],
    }
  });

  map.addLayer({
    id: 'manhattan-line', type: 'line', source: 'manhattan-nta',
    paint: {
      'line-color': ['case', ['boolean', ['feature-state', 'active'], false], 'rgba(255,215,0,0.8)', 'rgba(255,255,255,0.2)'],
      'line-width': ['case', ['boolean', ['feature-state', 'active'], false], 2, 0.5],
    }
  });

  map.addLayer({
    id: 'manhattan-labels', type: 'symbol', source: 'manhattan-nta',
    layout: {
      'text-field': ['get', 'name'],
      'text-size': ['interpolate', ['linear'], ['zoom'], 10, 8, 12, 11, 14, 13, 16, 15],
      'text-font': ['DIN Pro Medium', 'Arial Unicode MS Regular'],
      'text-transform': 'uppercase',
      'text-letter-spacing': 0.04,
      'text-max-width': 12,
      'text-anchor': 'center',
      'text-allow-overlap': false,
      'text-padding': 3,
    },
    paint: {
      'text-color': ['case', ['boolean', ['feature-state', 'edited'], false], '#FFD700', 'rgba(255,255,255,0.7)'],
      'text-halo-color': 'rgba(0,0,0,0.85)',
      'text-halo-width': 1.5,
    }
  });

  // Hover
  let hoveredId = null;
  map.on('mousemove', 'manhattan-fill', (e) => {
    if (hoveredId !== null) map.setFeatureState({ source: 'manhattan-nta', id: hoveredId }, { hover: false });
    if (e.features.length > 0) {
      hoveredId = e.features[0].id;
      map.setFeatureState({ source: 'manhattan-nta', id: hoveredId }, { hover: true });
      map.getCanvas().style.cursor = 'pointer';
    }
  });
  map.on('mouseleave', 'manhattan-fill', () => {
    if (hoveredId !== null) { map.setFeatureState({ source: 'manhattan-nta', id: hoveredId }, { hover: false }); hoveredId = null; }
    map.getCanvas().style.cursor = '';
  });
  map.on('click', 'manhattan-fill', (e) => {
    if (e.features.length > 0) {
      const ntaCode = e.features[0].properties.ntaCode;
      const hood = manhattanHoods.find(h => h.ntaCode === ntaCode);
      if (hood) openEdit(hood.id);
    }
  });

  renderSidebar();
  updateStats();
}

// ─── Sidebar ───
function renderSidebar(filter = '') {
  const list = document.getElementById('hood-list');
  const lf = filter.toLowerCase();

  list.innerHTML = manhattanHoods
    .filter(h => !lf || h.name.toLowerCase().includes(lf) || h.id.toLowerCase().includes(lf))
    .map(h => {
      const display = nameOverrides[h.id] || h.name;
      const edited = !!nameOverrides[h.id];
      const active = activeHoodId === h.id;
      return `
        <div class="hood-row ${edited ? 'edited' : ''} ${active ? 'active' : ''} ${h.isSub ? 'is-sub' : ''}"
             onclick="openEdit('${escA(h.id)}')" data-id="${escA(h.id)}">
          <div class="hood-row-top">
            <div>
              <div class="hood-display-name">${esc(display)}</div>
              <div class="hood-id-tag">${esc(h.id)}</div>
            </div>
            <span class="edit-indicator">edited</span>
          </div>
          ${edited ? `<div class="hood-original">${esc(h.name)}</div>` : ''}
        </div>`;
    }).join('');
}

// ─── Edit ───
function openEdit(hoodId) {
  activeHoodId = hoodId;
  const hood = manhattanHoods.find(h => h.id === hoodId);
  if (!hood) return;

  // Highlight NTA polygon on map
  const ntaCodes = [...new Set(manhattanHoods.map(h => h.ntaCode))];
  ntaCodes.forEach((code, i) => {
    map.setFeatureState({ source: 'manhattan-nta', id: i }, { active: code === hood.ntaCode });
  });

  // Zoom to polygon
  const f = ntaFeatureMap[hood.ntaCode];
  if (f) {
    const bounds = new mapboxgl.LngLatBounds();
    const walk = (c) => { if (typeof c[0] === 'number') bounds.extend(c); else c.forEach(walk); };
    walk(f.geometry.coordinates);
    map.fitBounds(bounds, { padding: 100, duration: 500, bearing: 29 });
  }

  document.getElementById('edit-original-name').textContent = hood.name;
  document.getElementById('edit-hood-id').textContent = hoodId + (hood.isSub ? ' (sub of ' + hood.ntaCode + ')' : '');
  document.getElementById('edit-input').value = nameOverrides[hoodId] || hood.name;
  document.getElementById('edit-popup').classList.add('visible');
  document.getElementById('overlay').classList.add('visible');
  document.getElementById('edit-input').focus();
  document.getElementById('edit-input').select();
  renderSidebar(document.getElementById('search-input').value);
}

function closeEdit() {
  document.getElementById('edit-popup').classList.remove('visible');
  document.getElementById('overlay').classList.remove('visible');
  activeHoodId = null;
  const ntaCodes = [...new Set(manhattanHoods.map(h => h.ntaCode))];
  ntaCodes.forEach((code, i) => { map.setFeatureState({ source: 'manhattan-nta', id: i }, { active: false }); });
  renderSidebar(document.getElementById('search-input').value);
}

function saveEdit() {
  const hoodId = activeHoodId;
  const hood = manhattanHoods.find(h => h.id === hoodId);
  const newName = document.getElementById('edit-input').value.trim();
  if (!newName || newName === hood.name) {
    delete nameOverrides[hoodId];
  } else {
    nameOverrides[hoodId] = newName;
  }
  updateMapLabels();
  updateStats();
  closeEdit();
  toast('Saved: ' + (nameOverrides[hoodId] || hood.name));
}

function resetCurrent() {
  delete nameOverrides[activeHoodId];
  updateMapLabels();
  updateStats();
  closeEdit();
  toast('Reset to original');
}

function resetAll() {
  if (!confirm('Reset all edits?')) return;
  nameOverrides = {};
  updateMapLabels();
  updateStats();
  renderSidebar(document.getElementById('search-input').value);
  toast('All edits cleared');
}

// ─── Update map labels ───
function updateMapLabels() {
  const src = map.getSource('manhattan-nta');
  if (!src) return;
  const ntaCodes = [...new Set(manhattanHoods.map(h => h.ntaCode))];
  const features = [];

  ntaCodes.forEach((code, i) => {
    const f = ntaFeatureMap[code];
    if (!f) return;
    const subs = manhattanHoods.filter(h => h.ntaCode === code);
    const label = subs.map(h => nameOverrides[h.id] || h.name).join(' · ');
    const anyEdited = subs.some(h => !!nameOverrides[h.id]);

    features.push({
      type: 'Feature', id: i,
      properties: { ntaCode: code, name: label, _idx: i },
      geometry: f.geometry,
    });
  });

  src.setData({ type: 'FeatureCollection', features });

  setTimeout(() => {
    ntaCodes.forEach((code, i) => {
      const subs = manhattanHoods.filter(h => h.ntaCode === code);
      const anyEdited = subs.some(h => !!nameOverrides[h.id]);
      map.setFeatureState({ source: 'manhattan-nta', id: i }, { edited: anyEdited });
    });
  }, 50);
}

function updateStats() {
  document.getElementById('edited-count').textContent = Object.keys(nameOverrides).length;
  document.getElementById('total-count').textContent = manhattanHoods.length;
}

// ─── Export ───
function exportOverrides() {
  const entries = Object.entries(nameOverrides);
  if (entries.length === 0) { toast('No edits to export'); return; }

  // Generate updated NEIGHBORHOODS entries
  let js = '// Updated neighborhood names — paste into data/neighborhoods.js\n';
  js += '// Changes:\n';
  entries.sort((a, b) => a[0].localeCompare(b[0]));
  entries.forEach(([id, name]) => {
    const orig = manhattanHoods.find(h => h.id === id);
    js += `//   ${id}: "${orig ? orig.name : '?'}" → "${name}"\n`;
  });
  js += '\n// Find-and-replace these name values in data/neighborhoods.js:\n';
  entries.forEach(([id, name]) => {
    const orig = manhattanHoods.find(h => h.id === id);
    if (orig) {
      js += `// { id: '${id}', name: '${orig.name}' ...  →  name: '${name}'\n`;
    }
  });

  navigator.clipboard.writeText(js).then(() => {
    toast('Copied to clipboard!');
  }).catch(() => {
    const blob = new Blob([js], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'name-edits.js'; a.click();
    toast('Downloaded name-edits.js');
  });
}

function applyToProject() {
  const entries = Object.entries(nameOverrides);
  if (entries.length === 0) { toast('No edits to apply'); return; }

  let msg = 'Edits to apply to neighborhoods.js:\n\n';
  entries.forEach(([id, name]) => {
    const orig = manhattanHoods.find(h => h.id === id);
    msg += `  ${orig ? orig.name : id} → ${name}\n`;
  });
  msg += '\nExport these changes?';
  if (confirm(msg)) exportOverrides();
}

// ─── Utilities ───
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escA(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2000);
}

document.getElementById('search-input').addEventListener('input', (e) => renderSidebar(e.target.value));
document.getElementById('edit-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') saveEdit();
  if (e.key === 'Escape') closeEdit();
});
</script>
</body>
</html>
