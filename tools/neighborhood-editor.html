<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manhattan Neighborhood Boundary Editor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }

#sidebar {
  width: 320px; min-width: 320px; background: #16213e; border-right: 1px solid #333;
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar h2 { padding: 16px; font-size: 18px; border-bottom: 1px solid #333; background: #0f3460; }
#hood-search { width: 100%; padding: 10px 14px; background: #1a1a2e; border: 1px solid #444; color: #fff; font-size: 14px; outline: none; }
#hood-search:focus { border-color: #FF1493; }
#hood-list { flex: 1; overflow-y: auto; }
.hood-item {
  padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #222;
  display: flex; justify-content: space-between; align-items: center;
  transition: background 0.15s;
}
.hood-item:hover { background: #1a2744; }
.hood-item.active { background: #0f3460; border-left: 3px solid #FF1493; }
.hood-item.has-poly .hood-status { color: #4ade80; }
.hood-item.no-poly .hood-status { color: #ef4444; }
.hood-name { font-size: 13px; font-weight: 500; }
.hood-id { font-size: 10px; color: #888; margin-top: 2px; }
.hood-status { font-size: 11px; font-weight: 600; }

#map-container { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

#controls {
  position: absolute; top: 12px; right: 12px; z-index: 1000;
  display: flex; flex-direction: column; gap: 8px;
}
.ctrl-btn {
  padding: 8px 16px; background: #0f3460; border: 1px solid #555; color: #fff;
  cursor: pointer; font-size: 13px; border-radius: 6px; transition: all 0.15s;
  white-space: nowrap;
}
.ctrl-btn:hover { background: #1a4a8a; }
.ctrl-btn.active { background: #FF1493; border-color: #FF1493; }
.ctrl-btn.danger { background: #991b1b; border-color: #dc2626; }
.ctrl-btn.export { background: #065f46; border-color: #10b981; }

#info-panel {
  position: absolute; bottom: 12px; left: 12px; right: 12px; z-index: 1000;
  background: rgba(15, 52, 96, 0.95); border: 1px solid #444; border-radius: 8px;
  padding: 12px 16px; font-size: 13px; backdrop-filter: blur(8px);
  display: none;
}
#info-panel h3 { color: #FF1493; margin-bottom: 6px; font-size: 15px; }
#info-panel .hint { color: #aaa; font-size: 12px; margin-top: 4px; }

#export-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000;
  display: none; align-items: center; justify-content: center;
}
#export-modal.active { display: flex; }
#export-content {
  background: #16213e; border: 1px solid #555; border-radius: 12px;
  padding: 24px; width: 90%; max-width: 800px; max-height: 80vh;
  display: flex; flex-direction: column;
}
#export-content h3 { margin-bottom: 12px; color: #FF1493; }
#export-textarea {
  flex: 1; min-height: 400px; background: #0a0a1a; color: #4ade80;
  border: 1px solid #444; border-radius: 6px; padding: 12px;
  font-family: 'Fira Code', monospace; font-size: 12px; resize: none;
}
#export-content .btns { margin-top: 12px; display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>Neighborhoods (Manhattan)</h2>
  <input type="text" id="hood-search" placeholder="Search neighborhoods..." oninput="filterList()">
  <div id="hood-list"></div>
</div>

<div id="map-container">
  <div id="map"></div>
  <div id="controls">
    <button class="ctrl-btn" id="btn-draw" onclick="toggleDraw()">✏️ Draw Polygon</button>
    <button class="ctrl-btn danger" id="btn-delete" onclick="deleteSelected()">🗑️ Delete Polygon</button>
    <button class="ctrl-btn" onclick="resetView()">🎯 Reset View</button>
    <button class="ctrl-btn export" onclick="exportAll()">📦 Export All</button>
    <button class="ctrl-btn export" onclick="copyExport()">📋 Copy to Clipboard</button>
  </div>
  <div id="info-panel">
    <h3 id="info-name"></h3>
    <div id="info-details"></div>
    <div class="hint" id="info-hint"></div>
  </div>
</div>

<div id="export-modal">
  <div id="export-content">
    <h3>Export Boundaries — locality-boundaries.js</h3>
    <textarea id="export-textarea" readonly></textarea>
    <div class="btns">
      <button class="ctrl-btn" onclick="document.getElementById('export-modal').classList.remove('active')">Close</button>
      <button class="ctrl-btn export" onclick="copyExportText()">Copy to Clipboard</button>

<script src="../data/locality-boundaries.js"></script>
<script>
// Map locality names to sub-hood IDs
const LOCALITY_TO_ID = {
  'Financial District': 'MN-FiDi', 'Battery Park City': 'MN-BPC',
  'TriBeCa': 'MN-Tribeca', 'Civic Center': 'MN-CivCtr',
  'SoHo': 'MN-SoHo', 'Little Italy': 'MN-LittleItaly',
  'Hudson Square': 'MN-HudsonSq', 'NoLita': 'MN-Nolita',
  'Greenwich Village': 'MN-GrnwchVlg', 'NoHo': 'MN-NoHo',
  'West Village': 'MN-WestVlg', 'Meatpacking District': 'MN-Meatpacking',
  'Chinatown': 'MN-Chinatown', 'Two Bridges': 'MN-TwoBridges',
  'Lower East Side': 'MN-LES', 'Bowery': 'MN-Bowery',
  'East Village': 'MN-EastVlg', 'Alphabet City': 'MN-AlphaCity',
  'Chelsea': 'MN-Chelsea', 'Hudson Yards': 'MN-HudsonYards',
  "Hell's Kitchen": 'MN-HellsK', 'Garment District': 'MN-GarmentDist',
  'Flatiron District': 'MN-Flatiron', 'Union Square': 'MN-UnionSq',
  'NoMad': 'MN-NoMad', 'Koreatown': 'MN-Koreatown',
  'Midtown Center': 'MN-Midtown', 'Theater District': 'MN-TimesSq',
  'Diamond District': 'MN-DiamondDist',
  'Stuyvesant Town': 'MN-StuyTown', 'Peter Cooper Village': 'MN-PeterCooper',
  'Gramercy Park': 'MN-Gramercy', 'Rose Hill': 'MN-RoseHill',
  'Murray Hill': 'MN-MurrayHill', 'Kips Bay': 'MN-KipsBay',
  'Midtown East': 'MN-EastMidtown', 'Turtle Bay': 'MN-TurtleBay',
  'Sutton Place': 'MN-SuttonPl', 'Tudor City': 'MN-TudorCity',
  'Lincoln Square': 'MN-LincolnSq',
  'Upper West Side': 'MN-UWS', 'Manhattan Valley': 'MN-ManValley',
  'Lenox Hill': 'MN-LenoxHill', 'Upper East Side': 'MN-UES',
  'Carnegie Hill': 'MN-CarnegieHill', 'Yorkville': 'MN-Yorkville',
  'Morningside Heights': 'MN-MorningsideHts',
  'Manhattanville': 'MN-Manhattanville',
  'Hamilton Heights': 'MN-HamiltonHts', 'Sugar Hill': 'MN-SugarHill',
  'Harlem': 'MN-Harlem', 'East Harlem': 'MN-SpanishHarlem',
};

// ─── State ───
const polygons = {};       // hoodId → L.Polygon
let selectedId = null;
let drawMode = false;
let drawPoints = [];
let drawMarkers = [];
let drawPolyline = null;

// ─── Area computation (shoelace formula on lat/lng — fine for relative comparison) ───
function polyArea(latlngs) {
  let area = 0;
  const n = latlngs.length;
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    area += latlngs[i].lng * latlngs[j].lat;
    area -= latlngs[j].lng * latlngs[i].lat;
  }
  return Math.abs(area / 2);
}

// ─── Reorder all polygons so smaller ones render on top ───
function reorderBySize() {
  // Collect all polygon entries with their areas
  const entries = Object.entries(polygons).map(([id, poly]) => {
    const latlngs = poly.getLatLngs()[0];
    return { id, poly, area: polyArea(latlngs) };
  });
  // Sort descending by area (largest first = added first = bottom layer)
  entries.sort((a, b) => b.area - a.area);
  // Remove all from map, re-add in order
  entries.forEach(e => e.poly.remove());
  entries.forEach(e => e.poly.addTo(map));
  // If a polygon is currently selected, make sure it's on top
  if (selectedId && polygons[selectedId]) {
    polygons[selectedId].bringToFront();
  }
  // Apply priority visibility — hide larger polygons that overlap smaller ones
  applyPriorityVisibility(entries);
}

// ─── Restore z-order only (no visibility recalc) ───
function restoreZOrder() {
  const entries = Object.entries(polygons).map(([id, poly]) => ({
    id, poly, area: polyArea(poly.getLatLngs()[0])
  }));
  entries.sort((a, b) => b.area - a.area);
  entries.forEach(e => e.poly.remove());
  entries.forEach(e => e.poly.addTo(map));
  if (selectedId && polygons[selectedId]) {
    polygons[selectedId].bringToFront();
  }
}

// ─── Hide larger overlapping polygons unless hovered ───
function applyPriorityVisibility(entries) {
  if (!entries) {
    entries = Object.entries(polygons).map(([id, poly]) => {
      const latlngs = poly.getLatLngs()[0];
      return { id, poly, area: polyArea(latlngs) };
    });
  }

  entries.forEach(entry => {
    // Check if any smaller polygon's bounds overlap this one
    const isOverlapped = entries.some(other =>
      other.id !== entry.id &&
      other.area < entry.area &&
      entry.poly.getBounds().intersects(other.poly.getBounds())
    );

    const hood = HOODS.find(h => h.id === entry.id);
    const color = getColor(hood?.parent);

    // Remove old hover handlers to avoid stacking
    entry.poly.off('mouseover');
    entry.poly.off('mouseout');

    if (isOverlapped) {
      // Large overlapped polygon: nearly invisible by default
      entry.poly.setStyle({ fillOpacity: 0.03, opacity: 0.12 });
      entry.poly._isHiddenLarge = true;

      entry.poly.on('mouseover', function() {
        if (this._isHiddenLarge && entry.id !== selectedId) {
          this.setStyle({ fillOpacity: 0.3, opacity: 0.8 });
          this.bringToFront();
        }
      });
      entry.poly.on('mouseout', function() {
        if (this._isHiddenLarge && entry.id !== selectedId) {
          this.setStyle({ fillOpacity: 0.03, opacity: 0.12 });
          // Restore z-order without re-triggering visibility calc
          restoreZOrder();
        }
      });
    } else {
      // Small or non-overlapping polygon: normal visibility
      entry.poly.setStyle({ fillOpacity: 0.25, opacity: 1, color: color });
      entry.poly._isHiddenLarge = false;
    }
  });
}

// ─── Colors per parent NTA ───
const NTA_COLORS = {};
const palette = [
  '#FF1493','#FF6B9D','#C71585','#DB7093','#FF69B4','#E91E90',
  '#FF4081','#F50057','#D81B60','#AD1457','#880E4F','#EC407A',
  '#F06292','#F48FB1','#CE93D8','#BA68C8','#AB47BC','#9C27B0',
  '#7B1FA2','#6A1B9A','#E040FB','#EA80FC','#FF80AB','#FF4081',
  '#F44336','#E53935','#C62828',
];
let colorIdx = 0;
function getColor(ntaCode) {
  if (!ntaCode) return '#FF1493';
  if (!NTA_COLORS[ntaCode]) { NTA_COLORS[ntaCode] = palette[colorIdx++ % palette.length]; }
  return NTA_COLORS[ntaCode];
}

// ─── Init map ───
const map = L.map('map', { zoomControl: true }).setView([40.758, -73.985], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

// ─── Load existing boundaries ───
function loadExisting() {
  if (typeof LOCALITY_BOUNDARIES === 'undefined') return;

  Object.entries(LOCALITY_BOUNDARIES).forEach(([name, data]) => {
    if (data.borough !== 'manhattan') return;
    const hoodId = LOCALITY_TO_ID[name];
    if (!hoodId) return;
    const hood = HOODS.find(h => h.id === hoodId);
    if (!hood) return;

    const latlngs = data.polygon.map(p => [p[0], p[1]]);
    const color = getColor(hood.parent);
    const poly = L.polygon(latlngs, {
      color: color, weight: 2, fillColor: color, fillOpacity: 0.25,
      className: 'hood-poly'
    }).addTo(map);

    poly.on('click', () => selectHood(hoodId));
    poly.bindTooltip(hood.name, { sticky: true, className: 'hood-tooltip' });
    polygons[hoodId] = poly;
  });
}

// ─── Render sidebar list ───
function renderList() {
  const list = document.getElementById('hood-list');
  const q = document.getElementById('hood-search').value.toLowerCase();

  list.innerHTML = HOODS
    .filter(h => !q || h.name.toLowerCase().includes(q) || h.id.toLowerCase().includes(q))
    .sort((a, b) => a.name.localeCompare(b.name))
    .map(h => {
      const hasPoly = !!polygons[h.id];
      return `<div class="hood-item ${hasPoly ? 'has-poly' : 'no-poly'} ${selectedId === h.id ? 'active' : ''}"
                   onclick="selectHood('${h.id}')">
        <div>
          <div class="hood-name">${h.name}</div>
          <div class="hood-id">${h.id} → ${h.parent || 'none'}</div>
        </div>
        <div class="hood-status">${hasPoly ? '✓' : '✗'}</div>
      </div>`;
    }).join('');
}

function filterList() { renderList(); }

// ─── Select a neighborhood ───
function selectHood(id) {
  // Deselect previous
  if (selectedId && polygons[selectedId]) {
    const prev = HOODS.find(h => h.id === selectedId);
    const prevColor = getColor(prev?.parent);
    if (polygons[selectedId]._isHiddenLarge) {
      polygons[selectedId].setStyle({ color: prevColor, weight: 2, fillOpacity: 0.03, opacity: 0.12 });
    } else {
      polygons[selectedId].setStyle({ color: prevColor, weight: 2, fillOpacity: 0.25 });
    }
    disableEditing(selectedId);
  }

  selectedId = id;
  const hood = HOODS.find(h => h.id === id);
  if (!hood) return;

  // Highlight
  if (polygons[id]) {
    polygons[id].setStyle({ color: '#FFD700', weight: 3, fillOpacity: 0.35 });
    polygons[id].bringToFront();
    enableEditing(id);
    map.fitBounds(polygons[id].getBounds(), { padding: [60, 60], maxZoom: 16 });
  } else {
    map.setView(hood.center, 16);
  }

  // Info panel
  const panel = document.getElementById('info-panel');
  panel.style.display = 'block';
  document.getElementById('info-name').textContent = hood.name;
  document.getElementById('info-details').textContent = polygons[id]
    ? `${polygons[id].getLatLngs()[0].length} vertices · Drag vertices to edit`
    : 'No polygon yet';
  document.getElementById('info-hint').textContent = polygons[id]
    ? 'Drag corner points to reshape. Click "Delete Polygon" to remove.'
    : 'Click "Draw Polygon" then click points on the map to create a boundary.';

  renderList();
}

// ─── Enable/disable vertex editing ───
function enableEditing(id) {
  if (!polygons[id]) return;
  // Leaflet doesn't have built-in editing; we add draggable vertex markers
  const poly = polygons[id];
  const latlngs = poly.getLatLngs()[0];
  if (poly._editMarkers) return;

  poly._editMarkers = latlngs.map((ll, i) => {
    const m = L.circleMarker(ll, {
      radius: 5, color: '#FFD700', fillColor: '#fff', fillOpacity: 1,
      weight: 2, draggable: false
    }).addTo(map);

    // Make draggable via mouse events
    m._idx = i;
    m._parentPoly = poly;
    m.on('mousedown', startDragVertex);
    return m;
  });
}

function disableEditing(id) {
  if (!polygons[id] || !polygons[id]._editMarkers) return;
  polygons[id]._editMarkers.forEach(m => { map.removeLayer(m); });
  delete polygons[id]._editMarkers;
}

// ─── Vertex dragging ───
let draggingMarker = null;
function startDragVertex(e) {
  draggingMarker = e.target;
  map.dragging.disable();
  map.on('mousemove', onDragVertex);
  map.on('mouseup', stopDragVertex);
}
function onDragVertex(e) {
  if (!draggingMarker) return;
  draggingMarker.setLatLng(e.latlng);
  const poly = draggingMarker._parentPoly;
  const latlngs = poly.getLatLngs()[0];
  latlngs[draggingMarker._idx] = e.latlng;
  poly.setLatLngs(latlngs);
}
function stopDragVertex() {
  if (!draggingMarker) return;
  map.dragging.enable();
  map.off('mousemove', onDragVertex);
  map.off('mouseup', stopDragVertex);
  draggingMarker = null;
  reorderBySize();
  updateInfoPanel();
}

function updateInfoPanel() {
  if (!selectedId || !polygons[selectedId]) return;
  document.getElementById('info-details').textContent =
    `${polygons[selectedId].getLatLngs()[0].length} vertices · Drag vertices to edit`;
}

// ─── Draw mode ───
function toggleDraw() {
  drawMode = !drawMode;
  document.getElementById('btn-draw').classList.toggle('active', drawMode);

  if (drawMode) {
    if (!selectedId) { alert('Select a neighborhood first!'); drawMode = false; document.getElementById('btn-draw').classList.remove('active'); return; }
    drawPoints = [];
    drawMarkers = [];
    map.getContainer().style.cursor = 'crosshair';
    map.on('click', onDrawClick);
    document.getElementById('info-hint').textContent = 'Click points on the map to create boundary. Double-click to finish.';
    map.on('dblclick', finishDraw);
  } else {
    cancelDraw();
  }
}

function onDrawClick(e) {
  if (!drawMode) return;
  drawPoints.push(e.latlng);

  const m = L.circleMarker(e.latlng, {
    radius: 5, color: '#4ade80', fillColor: '#fff', fillOpacity: 1, weight: 2
  }).addTo(map);
  drawMarkers.push(m);

  if (drawPolyline) map.removeLayer(drawPolyline);
  if (drawPoints.length > 1) {
    drawPolyline = L.polyline(drawPoints, { color: '#4ade80', weight: 2, dashArray: '5,5' }).addTo(map);
  }
}

function finishDraw(e) {
  if (!drawMode || drawPoints.length < 3) return;
  L.DomEvent.stopPropagation(e);
  L.DomEvent.preventDefault(e);

  // Remove draw helpers
  drawMarkers.forEach(m => map.removeLayer(m));
  if (drawPolyline) map.removeLayer(drawPolyline);

  // Remove existing polygon if any
  if (polygons[selectedId]) {
    disableEditing(selectedId);
    map.removeLayer(polygons[selectedId]);
  }

  // Create new polygon
  const hood = HOODS.find(h => h.id === selectedId);
  const color = getColor(hood?.parent);
  const poly = L.polygon(drawPoints, {
    color: '#FFD700', weight: 3, fillColor: color, fillOpacity: 0.35
  }).addTo(map);

  poly.on('click', () => selectHood(selectedId));
  poly.bindTooltip(hood.name, { sticky: true });
  polygons[selectedId] = poly;
  enableEditing(selectedId);

  // Cleanup
  drawMode = false;
  drawPoints = [];
  drawMarkers = [];
  drawPolyline = null;
  map.getContainer().style.cursor = '';
  map.off('click', onDrawClick);
  map.off('dblclick', finishDraw);
  document.getElementById('btn-draw').classList.remove('active');
  reorderBySize();
  updateInfoPanel();
  renderList();
}

function cancelDraw() {
  drawMarkers.forEach(m => map.removeLayer(m));
  if (drawPolyline) map.removeLayer(drawPolyline);
  drawPoints = [];
  drawMarkers = [];
  drawPolyline = null;
  map.getContainer().style.cursor = '';
  map.off('click', onDrawClick);
  map.off('dblclick', finishDraw);
}

// ─── Delete polygon ───
function deleteSelected() {
  if (!selectedId || !polygons[selectedId]) return;
  if (!confirm(`Delete polygon for "${HOODS.find(h => h.id === selectedId)?.name}"?`)) return;
  disableEditing(selectedId);
  map.removeLayer(polygons[selectedId]);
  delete polygons[selectedId];
  updateInfoPanel();
  renderList();
}

// ─── Reset view ───
function resetView() { map.setView([40.758, -73.985], 13); }

// ─── Export ───
function exportAll() {
  const lines = ['const LOCALITY_BOUNDARIES = {'];

  Object.entries(polygons).sort(([a],[b]) => a.localeCompare(b)).forEach(([id, poly]) => {
    const hood = HOODS.find(h => h.id === id);
    if (!hood) return;
    const latlngs = poly.getLatLngs()[0];
    const center = poly.getBounds().getCenter();

    lines.push(`  "${hood.name}": {`);
    lines.push(`    borough: "manhattan",`);
    lines.push(`    center: [${center.lat.toFixed(5)}, ${center.lng.toFixed(5)}],`);
    const pts = latlngs.map(ll => `[${ll.lat.toFixed(5)},${ll.lng.toFixed(5)}]`).join(',');
    lines.push(`    polygon: [${pts}]`);
    lines.push(`  },`);
  });

  lines.push('};');

  document.getElementById('export-textarea').value = lines.join('\n');
  document.getElementById('export-modal').classList.add('active');
}

function copyExport() {
  exportAll();
  copyExportText();
}

function copyExportText() {
  const ta = document.getElementById('export-textarea');
  ta.select();
  document.execCommand('copy');
  alert('Copied to clipboard!');
}

// ─── Init ───
loadExisting();
reorderBySize();
renderList();
// Add center markers for neighborhoods without polygons
HOODS.forEach(hood => {
  if (!polygons[hood.id]) {
    L.circleMarker(hood.center, {
      radius: 4, color: '#FF1493', fillColor: '#FF1493', fillOpacity: 0.7, weight: 1
    }).addTo(map).bindTooltip(hood.name + ' (no boundary)', { direction: 'top' });
  }
});
</script>
